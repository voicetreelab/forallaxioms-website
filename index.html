<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ForAllAxioms</title>
  <meta name="description" content="We build VoiceTree — Agent Orchestration for forecasting.">
  <link rel="canonical" href="https://forallaxioms.com/">
  <style>
    :root { color-scheme: light; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #ffffff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      line-height: 1.6;
    }
    main {
      max-width: 520px;
      text-align: center;
    }
    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }
    p {
      font-size: 1.05rem;
      color: #444;
      margin-bottom: 28px;
    }
    a.cta {
      display: inline-block;
      padding: 12px 24px;
      background: #1a1a1a;
      color: #ffffff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 500;
      transition: opacity 0.15s ease;
    }
    a.cta:hover { opacity: 0.85; }
    footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #999;
    }
  </style>
</head>
<body>
  <main>
    <h1>ForAllAxioms</h1>
    <p>We build VoiceTree — Agent Orchestration for forecasting.</p>
    <a class="cta" href="https://voicetree.io">Visit VoiceTree</a>
    <footer>&copy; 2026 ForAllAxioms Pty Ltd</footer>
  </main>
</body>
</html>
